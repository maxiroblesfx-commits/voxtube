services:
  - type: web
    name: voxtube-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: WHISPER_MODEL
        value: small
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8
      - key: MAX_VIDEO_DURATION
        value: "600"
      - key: ALLOWED_ORIGINS
        value: "https://voxtube.vercel.app,http://localhost:5500,http://127.0.0.1:5500"
    healthCheckPath: /health
